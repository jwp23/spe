name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Scan for secrets
        run: |
          docker run --rm -v "${{ github.workspace }}:/scan" ghcr.io/betterleaks/betterleaks:latest dir --redact /scan

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system utilities
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fontconfig

      - name: Audit dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test

      - name: Run integration tests
        run: cargo test -- --ignored

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check licenses and advisories
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: spe-sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: spe-sbom.cdx.json
          fail-build: true
          severity-cutoff: critical
          output-format: table
