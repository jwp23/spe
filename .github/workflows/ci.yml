name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Scan for secrets
        run: |
          docker run --rm -v "${{ github.workspace }}:/scan" ghcr.io/betterleaks/betterleaks:latest dir --redact /scan

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system utilities
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fontconfig

      - name: Audit dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test

      - name: Run integration tests
        run: cargo test -- --ignored

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check licenses and advisories
        uses: EmbarkStudios/cargo-deny-action@v2

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: spe-sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@v7
        with:
          sbom: spe-sbom.cdx.json
          fail-build: true
          severity-cutoff: critical
          output-format: table
