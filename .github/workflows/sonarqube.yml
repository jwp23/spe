name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, llvm-tools-preview

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install system utilities
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fontconfig

      - name: Generate code coverage
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --lcov --output-path lcov.info -- --include-ignored

      # Pinned by version tag rather than SHA: a 40-hex SHA next to "sonarqube"
      # trips Semgrep's generic SonarQube-token detector. Dependabot tracks the tag.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

