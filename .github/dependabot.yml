# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # dtolnay/rust-toolchain pins a SHA on the rolling `stable` branch and
      # publishes no semver release tags, so Dependabot cannot resolve a version
      # for it and fails the entire github-actions update job. Bump the toolchain
      # action manually instead.
      - dependency-name: "dtolnay/rust-toolchain"
